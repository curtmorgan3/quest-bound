# SPA fallback: serve index.html for non-file routes so BrowserRouter works on refresh.
# Also mirrored in public/_redirects (copied into dist/) so deploys always pick it up.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Service worker must be revalidated or browsers may never fetch a new sw.js after deploys.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"